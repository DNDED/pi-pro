name: CI

on:
  push:
    branches: [master, cluster/**]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
      - name: Coverage
        run: |
          pnpm --filter "@pi/checkpoint" coverage
          pnpm --filter "@pi/memory" coverage
          pnpm --filter "@pi/skill-bundle" coverage
          pnpm --filter "@pi/provider" coverage
          pnpm --filter "@pi/tools" coverage
          pnpm --filter "@pi/tui-pro" coverage
          pnpm --filter "@pi/subagent" coverage
          pnpm --filter "@pi/tasks" coverage
          pnpm --filter "@pi/bench" coverage
      - name: Fail if any package coverage < 70%
        run: |
          for d in packages/*/coverage; do
            if [ -f "$d/coverage-summary.json" ]; then
              pct=$(node -e "const s=require('./$d/coverage-summary.json');console.log(s.total.lines.pct)")
              echo "$d: ${pct}%"
              node -e "const s=require('./$d/coverage-summary.json');if(s.total.lines.pct<70){process.exit(1)}"
            fi
          done
